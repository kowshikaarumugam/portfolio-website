name: portfolio-deployment

on:
  workflow_dispatch

jobs:
  build-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: get pem file
        run: |
          echo "${{ secrets.kowshi_devops }}" > key.pem
          chmod 400 key.pem

      - name: copy project to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r * ec2-user@13.206.144.100:/home/ec2-user/portfolio

      - name: run portfolio application
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@13.206.144.100"
          cd /home/ec2-user/portfolio &&
          python3 -m venv virtualenv &&
          source virtualenv/bin/activate &&
          pip3 install -r requirements.txt &&
          pkill -f app.py || true &&
          nohup python3 app.py > output.log 2>&1 &
          "
