name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4   # fixed version

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: 13.206.144.100 
        username: ec2-user
        key: ${{ secrets.kowshi_devops }}
        script: |
          cd portfolio || git clone https://github.com/YOUR_USERNAME/portfolio.git
          cd portfolio
          git pull
          docker build -t portfolio-app .
          docker stop portfolio-app || true
          docker rm portfolio-app || true
          docker run -d -p 5000:5000 --name portfolio-app portfolio-app
